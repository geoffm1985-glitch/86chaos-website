<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>86chaos | Coming Soon</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            /* This is the dark fallback color behind the map */
            background-color: #0a0a0a; 
            /* Your Wisconsin map background */
            background-image: url('86chaos-bg.jpg'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            
            /* Centers everything perfectly on the screen */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 30px; /* Space between the logo and the coming soon image */
            padding: 20px;
            width: 100%;
        }

        .main-logo {
            max-width: 90%;
            width: 700px; /* Limits how big the logo gets on desktop */
            height: auto;
        }

        .coming-soon-img {
            max-width: 80%;
            width: 350px; /* Keeps the coming soon text smaller than the logo */
            height: auto;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="chaosblue.jpg" alt="86 Chaos Kitchen Management OS" class="main-logo">
        
        <img src="comingsoon.jpg" alt="Coming Soon" class="coming-soon-img">
    </div>

</body>
</html>
