<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>86chaos | Coming Soon</title>
    <style>
        /* 1. Global Background & Text */
        body, html {
            margin: 0;
            padding: 0;
            background-color: #050608; /* Very dark slate to match the vibe */
            color: #e2e8f0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* 2. Top Content Container (Logo & Text) */
        .top-section {
            flex-grow: 1; /* Pushes the map down to the bottom */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            text-align: center;
        }

        /* 3. The Logo - CSS Magic removes the box */
        .logo {
            max-width: 90%;
            width: 650px; /* Looks huge on desktop, automatically shrinks on mobile */
            height: auto;
            margin-bottom: 25px;
            
            /* THE MAGIC LINE: This deletes the solid background box from your JPG */
            mix-blend-mode: screen; 
        }

        /* 4. The Tagline Text */
        .tagline {
            font-size: 1.25rem;
            line-height: 1.6;
            color: #94a3b8;
            max-width: 600px;
            margin: 0 auto;
        }

        /* 5. Bottom Map Container */
        .map-container {
            width: 100%;
            display: flex;
            justify-content: center;
            background-color: #050608;
        }

        .map-image {
            width: 100%;
            max-width: 1600px; /* Prevents it from getting absurdly huge on ultrawide monitors */
            height: auto;
            object-fit: cover;
            
            /* Softens the top edge of the map to fade it into the background */
            mask-image: linear-gradient(to bottom, transparent 0%, black 15%);
            -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 15%);
        }
    </style>
</head>
<body>

    <div class="top-section">
        <img src="chaosblue.jpg" alt="86 Chaos Logo" class="logo">
        <p class="tagline">
            The ultimate Kitchen Management OS is currently in development.<br>
            Prepare to bring order to the line.
        </p>
    </div>

    <div class="map-container">
        <img src="86chaos-bg.jpg" alt="Wisconsin Background" class="map-image">
    </div>

</body>
</html>
