<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>86chaos | Coming Soon</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            /* Sets a deep black base color */
            background-color: #000000; 
            
            /* Makes your Wisconsin map cover the entire background */
            background-image: url('86chaos-bg.jpg'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            
            /* Keeps the background map locked in place when scrolling on mobile */
            background-attachment: fixed; 
            
            /* Centers your images perfectly */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 25px; /* Controls the space between the logo and coming soon image */
            width: 100%;
            padding: 20px;
        }

        /* This applies to both images and makes their dark backgrounds invisible */
        img {
            mix-blend-mode: screen; 
        }

        .logo {
            max-width: 90%;
            width: 700px;
            height: auto;
        }

        .coming-soon {
            max-width: 80%;
            width: 400px;
            height: auto;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Main Logo -->
        <img src="chaosblue.jpg" alt="86 Chaos Logo" class="logo">
        
        <!-- Coming Soon Image -->
        <img src="comingsoon.jpg" alt="Coming Soon" class="coming-soon">
    </div>

</body>
</html>
